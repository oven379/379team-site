server {
    listen 80;
    listen 443 ssl;
    server_name 379team.ru www.379team.ru;

    root /var/www/379team;
    index index.html;

    # SSL (замени на свои пути к сертификатам)
    # ssl_certificate /etc/letsencrypt/live/379team.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/379team.ru/privkey.pem;

    # Редирект www -> без www
    if ($host = www.379team.ru) {
        return 301 https://379team.ru$request_uri;
    }

    # llms.txt — правильный Content-Type для AI-парсеров
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        try_files /llms.txt =404;
    }

    # robots.txt
    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        try_files /robots.txt =404;
    }

    # sitemap.xml
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        try_files /sitemap.xml =404;
    }

    # Основной сайт
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Сжатие gzip для скорости
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Кеширование статики
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Безопасность
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
